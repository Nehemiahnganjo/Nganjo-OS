UI vesamenu.c32
DEFAULT nganjo-os
PROMPT 1
TIMEOUT 0
MENU TITLE Ng'anjo OS 1.0 Lite — Creator: Nehemiah Ng'anjo
MENU BACKGROUND splash.png
MENU COLOR border       30;44   #40ffffff #a0000000 std
MENU COLOR title        1;36;44 #00D2B4   #a0000000 std
MENU COLOR sel          7;37;40 #FFD166   #a0000000 std
MENU COLOR unsel        37;44   #90ffffff #a0000000 std

LABEL nganjo-os
  MENU LABEL Ng'anjo OS 1.0 Lite (Default)
  LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
  INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% quiet loglevel=3 splash
  TEXT HELP
  Boot Ng'anjo OS with the latest kernel.
  Creator: Nehemiah Ng'anjo
  ENDTEXT

LABEL nganjo-os-lts
  MENU LABEL Ng'anjo OS 1.0 Lite (LTS Kernel)
  LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux-lts
  INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux-lts.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% quiet loglevel=3 splash
  TEXT HELP
  Boot Ng'anjo OS with the extra-stable LTS kernel.
  ENDTEXT

LABEL nganjo-os-fallback
  MENU LABEL Ng'anjo OS (Fallback — safe mode)
  LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
  INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux-fallback.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% loglevel=5
  TEXT HELP
  Boot with fallback initramfs. Use if default fails.
  ENDTEXT

LABEL nganjo-os-vm
  MENU LABEL Ng'anjo OS (VM / VirtualBox / QEMU)
  LINUX /%INSTALL_DIR%/boot/x86_64/vmlinuz-linux
  INITRD /%INSTALL_DIR%/boot/x86_64/initramfs-linux.img
  APPEND archisobasedir=%INSTALL_DIR% archisolabel=%ARCHISO_LABEL% archisodevice=/dev/sr0 quiet loglevel=3 splash
  TEXT HELP
  Use this entry when booting in a virtual machine.
  ENDTEXT

LABEL memtest
  MENU LABEL Memory Test (memtest86+)
  COM32 memtest86+/memtest.bin
